<!doctype html>
<html lang="FR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
              content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <link rel="stylesheet" href="style.css">
        <title>Document</title>
    </head>
    <body>
        <main class="todo-container">
            <h1>Ma ToDo List Verticale</h1>
            <section class="todo-list vertical">
                <article class="todo-item">Acheter des légumes</article>
                <article class="todo-item">Faire du sport</article>
                <article class="todo-item">Lire un livre</article>
            </section>

            <h1>Ma ToDo List Horizontale</h1>
            <section class="todo-list horizontal">
                <article class="todo-item">Écrire dans mon journal</article>
                <article class="todo-item">Répondre aux emails</article>
                <article class="todo-item">Faire les courses</article>
            </section>
        </main>
    </body>
</html>
