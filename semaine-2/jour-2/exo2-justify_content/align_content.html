<!doctype html>
<html lang="FR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
              content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <link rel="stylesheet" href="align_content.css">
        <title>Document</title>
    </head>
    <body>
        <h1>Align content</h1>

        <h2>Flex Start</h2>
        <div class="container" id="flexstart">
            <div class="left"></div>
            <div class="center"></div>
            <div class="right"></div>
        </div>
        <h2>Flex End</h2>
        <div class="container" id="flexend">
            <div class="left"></div>
            <div class="center"></div>
            <div class="right"></div>
        </div>
        <h2>Center</h2>
        <div class="container" id="center">
            <div class="left"></div>
            <div class="center"></div>
            <div class="right"></div>
        </div>
        <h2>Space Between</h2>
        <div class="container" id="between">
            <div class="left"></div>
            <div class="center"></div>
            <div class="right"></div>
        </div>
        <h2>Space Around</h2>
        <div class="container" id="around">
            <div class="left"></div>
            <div class="center"></div>
            <div class="right"></div>
        </div>
        <h2>Stretch</h2>
        <div class="container" id="stretch">
            <div class="left"></div>
            <div class="center"></div>
            <div class="right"></div>
        </div>
    </body>
</html>
