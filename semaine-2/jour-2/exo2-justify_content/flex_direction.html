<!doctype html>
<html lang="FR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
              content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <link rel="stylesheet" href="flex_direction.css">
        <title>Document</title>
    </head>
    <body>

        <h1>Flex-Direction: Row</h1>
        <div class="container row">
            <div class="box">
                <h3>1</h3>
            </div>
            <div class="box">
                <h3>2</h3>
            </div>
            <div class="box">
                <h3>3</h3>
            </div>
            <div class="box">
                <h3>4</h3>
            </div>
            <div class="box">
                <h3>5</h3>
            </div>
        </div>
        <h1>Flex-Direction: Row-Reverse</h1>
        <div class="container row-reverse">
            <div class="box">
                <h3>1</h3>
            </div>
            <div class="box">
                <h3>2</h3>
            </div>
            <div class="box">
                <h3>3</h3>
            </div>
            <div class="box">
                <h3>4</h3>
            </div>
            <div class="box">
                <h3>5</h3>
            </div>
        </div>
        <h1>Flex-Direction: Column</h1>
        <div class="container column">
            <div class="box">
                <h3>1</h3>
            </div>
            <div class="box">
                <h3>2</h3>
            </div>
            <div class="box">
                <h3>3</h3>
            </div>
            <div class="box">
                <h3>4</h3>
            </div>
            <div class="box">
                <h3>5</h3>
            </div>
        </div>
        <h1>Flex-Direction: Column-Reverse</h1>
        <div class="container column-reverse">
            <div class="box">
                <h3>1</h3>
            </div>
            <div class="box">
                <h3>2</h3>
            </div>
            <div class="box">
                <h3>3</h3>
            </div>
            <div class="box">
                <h3>4</h3>
            </div>
            <div class="box">
                <h3>5</h3>
            </div>
        </div>
    </body>
</html>
